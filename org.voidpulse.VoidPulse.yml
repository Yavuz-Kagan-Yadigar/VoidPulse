app-id: org.voidpulse.VoidPulse
runtime: org.gnome.Platform
runtime-version: '49'
sdk: org.gnome.Sdk
command: voidpulse

finish-args:
  - --socket=wayland
  - --socket=fallback-x11
  - --share=ipc
  - --device=dri
  - --socket=pulseaudio
  - --filesystem=xdg-run/pipewire-0
  - --share=network
  - --filesystem=xdg-music
  - --filesystem=home:ro
  - --filesystem=xdg-config
  - --socket=session-bus
  - --own-name=org.mpris.MediaPlayer2.VoidPulse
  - --talk-name=org.gnome.SettingsDaemon.MediaKeys
  - --talk-name=org.freedesktop.login1

modules:
  - name: python-deps
    buildsystem: simple
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
      build-args:
        - --share=network
    build-commands:
      - pip3 install --prefix=/app --no-cache-dir --quiet mutagen
      - pip3 install --prefix=/app --no-cache-dir --quiet PyQt6 PyQt6-Qt6 PyQt6-sip numpy
    sources: []

  - name: voidpulse
    buildsystem: simple
    build-commands:
      - |
        cat > voidpulse-launcher << 'EOF'
        #!/bin/bash
        exec python3 /app/lib/voidpulse/voidpulse.py "$@"
        EOF
      - chmod +x voidpulse-launcher
      - |
        cat > appdata.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <component type="desktop-application">
          <id>org.voidpulse.VoidPulse</id>
          <metadata_license>CC0-1.0</metadata_license>
          <project_license>GPL-3.0-or-later</project_license>
          <name>VoidPulse</name>
          <summary>Touch and OLED friendly advanced music player</summary>
          <description><p>Touch and OLED friendly advanced music player</p></description>
          <launchable type="desktop-id">org.voidpulse.VoidPulse.desktop</launchable>
          <releases>
            <release version="1.5.0" date="2025-03-13"/>
          </releases>
          <content_rating type="oars-1.1"/>
        </component>
        EOF
      - install -Dm644 voidpulse.py /app/lib/voidpulse/voidpulse.py
      - install -Dm755 voidpulse-launcher /app/bin/voidpulse
      - install -Dm644 org.voidpulse.VoidPulse.desktop /app/share/applications/org.voidpulse.VoidPulse.desktop
      - install -Dm644 org.voidpulse.VoidPulse.svg /app/share/icons/hicolor/scalable/apps/org.voidpulse.VoidPulse.svg
      - install -Dm644 appdata.xml /app/share/metainfo/org.voidpulse.VoidPulse.appdata.xml
      - install -Dm644 NotoMusic-Regular.ttf /app/share/fonts/truetype/NotoMusic/NotoMusic-Regular.ttf
    sources:
      - type: file
        path: voidpulse.py
      - type: file
        path: org.voidpulse.VoidPulse.desktop
      - type: file
        path: org.voidpulse.VoidPulse.svg
      - type: file
        path: NotoMusic-Regular.ttf
